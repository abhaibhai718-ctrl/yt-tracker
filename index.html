<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="YT Tracker"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <title>YT Empire Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--txt);
      --bg:         #ffffff;
      --bg2:        #f5f4ef;
      --bg3:        #eeece7;
      --txt:        #1a1a18;
      --txt2:       #666660;
      --border:     #e0deda;
      --border2:    #c0beba;
      --success-bg: #eaf3de;
      --success-fg: #27500A;
      --warn-bg:    #faeeda;
      --warn-fg:    #633806;
      --danger-bg:  #fcebeb;
      --danger-fg:  #501313;
      --muted-bg:   #f0efea;
      --muted-fg:   #888880;
    }
    @media (prefers-color-scheme: dark) {
      body {
        --bg:         #111110;
        --bg2:        #1a1a18;
        --bg3:        #222220;
        --txt:        #e2e0d8;
        --txt2:       #888880;
        --border:     #2a2a28;
        --border2:    #3a3a38;
        --success-bg: #0a2e1a;
        --success-fg: #34d399;
        --warn-bg:    #2e1e00;
        --warn-fg:    #f59e0b;
        --danger-bg:  #2e0a0a;
        --danger-fg:  #f87171;
        --muted-bg:   #1e1e1c;
        --muted-fg:   #666660;
      }
    }
    input, textarea, select, button { font-family: inherit; }
    input[type="date"] { color-scheme: light dark; }
    .ch-item:hover    { background: var(--bg2); }
    .task-row:hover   { background: var(--bg2) !important; }
    .phase-card       { background: var(--bg); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
    input:focus, textarea:focus { outline: none; border-color: var(--border2) !important; }
    button { cursor: pointer; }
    button:active { opacity: 0.7; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--txt); color: var(--bg); padding: 10px 18px; border-radius: 20px;
      font-size: 12px; font-weight: 500; white-space: nowrap; z-index: 999;
      transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Mobile responsive */
    @media (max-width: 520px) {
      #sidebar { width: 160px !important; }
      #main    { padding: 14px 14px !important; }
    }
    @media (max-width: 400px) {
      #sidebar { display: none !important; }
      #hamburger { display: flex !important; }
      #sidebar.open { display: flex !important; position: fixed; inset: 0; z-index: 300; width: 100% !important; max-width: 260px; }
    }
  </style>
</head>
<body>

<div id="toast"></div>
<div id="root"></div>

<script>
// ─── Constants ─────────────────────────────────────────────────────────────
const SK  = 'yt-wf-v4';
const uid = () => Math.random().toString(36).slice(2, 9);
const COLORS = ['#378ADD','#D85A30','#1D9E75','#7F77DD','#BA7517','#D4537E'];

const DEFAULTS = [
  { id: uid(), name: 'Car Rants', subs: '331k', color: '#378ADD', phases: [
    { id: uid(), name: 'Phase 2 — Pre-June 15 Cleanup', tasks: [
      { id: uid(), name: 'Audit and delete Inauthentic flagged videos', date: '2026-05-20', notes: 'Focus on mass-produced / repetitive content', done: false },
      { id: uid(), name: 'Keep uploading original rant content',         date: '',           notes: 'Maintain algorithm momentum',              done: false },
    ]},
    { id: uid(), name: 'Phase 3 — YPP Reapply (Boss Fight)', tasks: [
      { id: uid(), name: 'Confirm Alpha Mindset toxic link is cleared', date: '2026-06-14', notes: 'Verify 1 day before reapplying',  done: false },
      { id: uid(), name: 'Hit Reapply for YPP on Car Rants',           date: '2026-06-15', notes: 'JUNE 15 — BOSS FIGHT DAY',        done: false },
    ]},
    { id: uid(), name: 'Phase 4 — Claim Silver Button', tasks: [
      { id: uid(), name: 'Claim Silver Play Button for Car Rants', date: '', notes: 'After YPP is accepted', done: false },
    ]},
  ]},
  { id: uid(), name: 'Alpha Mindset', subs: '132k', color: '#D85A30', phases: [
    { id: uid(), name: 'Phase 1 — Lift the Anchor', tasks: [
      { id: uid(), name: 'Upload original voiceover videos consistently', date: '', notes: 'Overwrite reused content history',                   done: false },
      { id: uid(), name: 'Reapply to YPP when eligible',                  date: '', notes: 'Must be clean to unlock Car Rants Silver Button',   done: false },
      { id: uid(), name: 'Claim Silver Play Button for Alpha Mindset',    date: '', notes: 'After YPP accepted',                                done: false },
    ]},
    { id: uid(), name: 'Phase 4 — Burn the Bridge', tasks: [
      { id: uid(), name: 'Leave YPP on Alpha Mindset voluntarily', date: '', notes: 'Severs from master AdSense — protects Car Rants', done: false },
    ]},
  ]},
];

// ─── State ─────────────────────────────────────────────────────────────────
let channels = [], selId = null, modal = null;
let notifPerm = typeof Notification !== 'undefined' ? Notification.permission : 'denied';

// ─── Persistence ───────────────────────────────────────────────────────────
function save() {
  try {
    const payload = JSON.stringify({ channels, selId });
    localStorage.setItem(SK, payload);
    // Also write to SW cache so background sync can read it
    if ('caches' in window) {
      caches.open('yt-tracker-v1').then(c =>
        c.put('/__data__', new Response(payload, { headers: { 'Content-Type': 'application/json' } }))
      );
    }
  } catch(e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(SK));
    if (d && d.channels?.length) { channels = d.channels; selId = d.selId || channels[0]?.id; return; }
  } catch(e) {}
  channels = DEFAULTS;
  selId = channels[0]?.id;
}

// ─── Notifications ─────────────────────────────────────────────────────────
async function requestNotifications() {
  if (typeof Notification === 'undefined') return showToast('Notifications not supported on this browser');
  const perm = await Notification.requestPermission();
  notifPerm = perm;
  if (perm === 'granted') {
    await registerPeriodicSync();
    checkNotifs();
    showToast('Notifications enabled');
  } else {
    showToast('Permission denied — check browser settings');
  }
  render();
}

async function registerPeriodicSync() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    // Periodic Background Sync — Android Chrome only, requires site to be installed as PWA
    if ('periodicSync' in reg) {
      const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
      if (status.state === 'granted') {
        await reg.periodicSync.register('deadline-check', { minInterval: 24 * 60 * 60 * 1000 });
        console.log('Periodic background sync registered (daily)');
      }
    }
  } catch(e) {
    console.log('Periodic sync not available:', e.message);
  }
}

function checkNotifs() {
  if (typeof Notification === 'undefined' || notifPerm !== 'granted') return;
  const now = Date.now();
  channels.forEach(ch => (ch.phases || []).forEach(ph => (ph.tasks || []).forEach(t => {
    if (t.done || !t.date) return;
    const days = Math.ceil((new Date(t.date + 'T23:59:59') - now) / 86400000);
    const k = `nf-${t.id}-${t.date}`;
    if (days >= 0 && days <= 3 && !sessionStorage.getItem(k)) {
      const label = days === 0 ? 'Due TODAY' : days === 1 ? 'Due TOMORROW' : `Due in ${days} days`;
      try {
        new Notification(`${label} — ${ch.name}`, {
          body: t.name, icon: '/icon-192.png', tag: t.id, requireInteraction: days <= 1,
        });
      } catch(e) {}
      sessionStorage.setItem(k, '1');
    }
  })));
}

// ─── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function daysLeft(d) {
  if (!d) return null;
  return Math.ceil((new Date(d + 'T23:59:59') - Date.now()) / 86400000);
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function badge(dateStr, done) {
  if (done) return `<span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--muted-bg);color:var(--muted-fg);white-space:nowrap;flex-shrink:0;">Done</span>`;
  if (!dateStr) return '';
  const d = daysLeft(dateStr); if (d === null) return '';
  let v;
  if      (d < 0)  v = ['var(--danger-bg)', 'var(--danger-fg)', `${Math.abs(d)}d overdue`];
  else if (d === 0) v = ['var(--danger-bg)', 'var(--danger-fg)', 'Today!'];
  else if (d <= 3)  v = ['var(--danger-bg)', 'var(--danger-fg)', `${d}d left`];
  else if (d <= 7)  v = ['var(--warn-bg)',   'var(--warn-fg)',   `${d}d left`];
  else              v = ['var(--success-bg)','var(--success-fg)',`${d}d left`];
  return `<span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:${v[0]};color:${v[1]};white-space:nowrap;flex-shrink:0;">${v[2]}</span>`;
}

// ─── Render ────────────────────────────────────────────────────────────────
function render() {
  const sel = channels.find(c => c.id === selId);

  // Sidebar
  const sidebar = `
    <div id="sidebar" style="width:200px;flex-shrink:0;border-right:0.5px solid var(--border);padding:16px 0;display:flex;flex-direction:column;gap:2px;background:var(--bg);min-height:100vh;">
      <div style="padding:0 14px 10px;font-size:11px;font-weight:500;color:var(--txt2);letter-spacing:0.08em;text-transform:uppercase;">Channels</div>
      ${channels.map(ch => `
        <div class="ch-item" data-cid="${ch.id}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;margin:0 6px;background:${selId === ch.id ? 'var(--bg2)' : 'transparent'};cursor:pointer;transition:background 0.1s;">
          <span style="width:8px;height:8px;border-radius:50%;background:${ch.color};flex-shrink:0;"></span>
          <div style="flex:1;overflow:hidden;">
            <div style="font-size:13px;font-weight:${selId === ch.id ? 500 : 400};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(ch.name)}</div>
            ${ch.subs ? `<div style="font-size:11px;color:var(--txt2);">${esc(ch.subs)} subs</div>` : ''}
          </div>
        </div>`).join('')}
      <div style="flex:1;"></div>
      <button id="btn-add-ch" style="margin:8px;padding:8px;background:transparent;border:0.5px dashed var(--border2);border-radius:6px;color:var(--txt2);font-size:12px;">+ Add channel</button>
      ${notifPerm !== 'granted'
        ? `<button id="btn-notif" style="margin:0 8px 12px;padding:9px;background:var(--warn-bg);border:none;border-radius:6px;color:var(--warn-fg);font-size:11px;font-weight:500;">Enable notifications</button>`
        : `<div style="margin:0 8px 12px;padding:7px 8px;background:var(--success-bg);border-radius:6px;color:var(--success-fg);font-size:11px;text-align:center;">Notifications on</div>`}
    </div>`;

  // Main
  let main = '';
  if (!sel) {
    main = `<div id="main" style="flex:1;padding:2rem;color:var(--txt2);">Select or add a channel to begin.</div>`;
  } else {
    const allT  = sel.phases.flatMap(p => p.tasks);
    const doneT = allT.filter(t => t.done).length;
    const pct   = allT.length ? Math.round(doneT / allT.length * 100) : 0;

    const phases = sel.phases.map((phase, idx) => {
      const pd     = phase.tasks.filter(t => t.done).length;
      const allDone = phase.tasks.length > 0 && pd === phase.tasks.length;

      const tasks = phase.tasks.map(t => `
        <div class="task-row" style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--border);background:${t.done ? 'var(--bg2)' : 'transparent'};transition:background 0.1s;">
          <div class="chk" data-tid="${t.id}" data-pid="${phase.id}" style="width:16px;height:16px;border-radius:4px;cursor:pointer;border:${t.done ? 'none' : '1.5px solid var(--border2)'};background:${t.done ? sel.color : 'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
            ${t.done ? `<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4L4 7L9 1" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;color:${t.done ? 'var(--txt2)' : 'var(--txt)'};text-decoration:${t.done ? 'line-through' : 'none'};">${esc(t.name)}</div>
            ${t.notes ? `<div style="font-size:11px;color:var(--txt2);margin-top:2px;">${esc(t.notes)}</div>` : ''}
            ${t.date  ? `<div style="font-size:11px;color:var(--txt2);margin-top:2px;">${fmtDate(t.date)}</div>` : ''}
          </div>
          ${badge(t.date, t.done)}
          <button class="del-task" data-tid="${t.id}" data-pid="${phase.id}" style="background:none;border:none;color:var(--txt2);font-size:15px;padding:0 2px;opacity:0.35;flex-shrink:0;">×</button>
        </div>`).join('');

      const arrow = idx < sel.phases.length - 1 ? `
        <div style="display:flex;justify-content:center;padding:4px 0;">
          <svg width="20" height="22" viewBox="0 0 20 22">
            <line x1="10" y1="0" x2="10" y2="16" stroke="var(--border2)" stroke-width="1.5"/>
            <path d="M5 12 L10 18 L15 12" fill="none" stroke="var(--border2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>` : '';

      return `
        <div class="phase-card" style="border-left:3px solid ${sel.color};opacity:${allDone ? 0.6 : 1};">
          <div style="display:flex;align-items:center;padding:11px 14px;${phase.tasks.length ? 'border-bottom:0.5px solid var(--border);' : ''}gap:8px;">
            <div style="flex:1;">
              <span style="font-weight:500;font-size:13px;">${esc(phase.name)}</span>
              ${phase.tasks.length ? `<span style="margin-left:8px;font-size:11px;color:var(--txt2);">${pd}/${phase.tasks.length}</span>` : ''}
            </div>
            <button class="add-task-btn" data-pid="${phase.id}" style="padding:3px 10px;font-size:11px;border-radius:4px;background:transparent;border:0.5px solid ${sel.color};color:${sel.color};font-weight:500;">+ Task</button>
            <button class="del-phase" data-pid="${phase.id}" style="background:none;border:none;color:var(--txt2);font-size:15px;padding:0 4px;opacity:0.35;">×</button>
          </div>
          ${tasks}
          ${!phase.tasks.length ? `<div style="padding:12px 14px;font-size:12px;color:var(--txt2);text-align:center;">No tasks yet — click + Task to add</div>` : ''}
        </div>${arrow}`;
    }).join('');

    main = `
      <div id="main" style="flex:1;padding:20px 24px;overflow:auto;background:var(--bg);">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:0.5px solid var(--border);">
          <div style="width:10px;height:10px;border-radius:50%;background:${sel.color};"></div>
          <div style="flex:1;">
            <div style="font-size:18px;font-weight:500;">${esc(sel.name)}</div>
            ${sel.subs ? `<div style="font-size:12px;color:var(--txt2);">${esc(sel.subs)} subscribers</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:12px;color:var(--txt2);">${doneT}/${allT.length} done</div>
            <div style="width:72px;height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:${sel.color};border-radius:2px;transition:width 0.3s;"></div>
            </div>
          </div>
          <button id="del-ch" style="background:none;border:none;color:var(--txt2);font-size:18px;padding:2px 5px;opacity:0.4;">×</button>
        </div>
        <div style="display:flex;flex-direction:column;">${phases}</div>
        <button id="btn-add-phase" style="margin-top:${sel.phases.length ? '12px' : '0'};width:100%;padding:12px;background:transparent;border:0.5px dashed var(--border2);border-radius:8px;color:var(--txt2);font-size:13px;">+ Add phase</button>
      </div>`;
  }

  // Modal
  let modalHtml = '';
  if (modal) {
    const c = sel?.color || '#378ADD';
    let fc = '';
    if (modal.type === 'channel') {
      fc = `
        <label style="display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500;">Name</label>
        <input id="f-name" style="width:100%;padding:8px 10px;font-size:13px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt);box-sizing:border-box;margin-bottom:12px;" placeholder="Channel name"/>
        <label style="display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500;">Subscribers</label>
        <input id="f-subs" style="width:100%;padding:8px 10px;font-size:13px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt);box-sizing:border-box;margin-bottom:12px;" placeholder="e.g. 331k"/>
        <label style="display:block;font-size:12px;color:var(--txt2);margin-bottom:6px;font-weight:500;">Color</label>
        <div style="display:flex;gap:8px;margin-bottom:16px;">${COLORS.map(x => `<div class="cpick" data-c="${x}" style="width:26px;height:26px;border-radius:50%;background:${x};cursor:pointer;border:2.5px solid transparent;flex-shrink:0;"></div>`).join('')}</div>
        <input id="f-color" type="hidden" value="${COLORS[0]}"/>`;
    } else if (modal.type === 'phase') {
      fc = `
        <label style="display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500;">Phase name</label>
        <input id="f-name" style="width:100%;padding:8px 10px;font-size:13px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt);box-sizing:border-box;margin-bottom:12px;" placeholder="e.g. Phase 1 — Fix Alpha Mindset"/>`;
    } else {
      fc = `
        <label style="display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500;">Task name</label>
        <input id="f-name" style="width:100%;padding:8px 10px;font-size:13px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt);box-sizing:border-box;margin-bottom:12px;" placeholder="What needs to be done?"/>
        <label style="display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500;">Due date (optional)</label>
        <input id="f-date" type="date" style="width:100%;padding:8px 10px;font-size:13px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt);box-sizing:border-box;margin-bottom:12px;"/>
        <label style="display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500;">Notes (optional)</label>
        <textarea id="f-notes" style="width:100%;padding:8px 10px;font-size:13px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt);box-sizing:border-box;margin-bottom:12px;height:56px;resize:vertical;" placeholder="Extra details..."></textarea>`;
    }
    const title = modal.type === 'channel' ? 'Add channel' : modal.type === 'phase' ? 'Add phase' : 'Add task';
    modalHtml = `
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;">
        <div style="background:var(--bg);border-radius:12px;border:0.5px solid var(--border);padding:20px;width:100%;max-width:340px;">
          <h3 style="font-weight:500;font-size:16px;margin-bottom:16px;">${title}</h3>
          ${fc}
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button id="m-cancel" style="padding:8px 16px;font-size:13px;border-radius:6px;background:transparent;border:0.5px solid var(--border2);color:var(--txt2);">Cancel</button>
            <button id="m-submit" style="padding:8px 16px;font-size:13px;border-radius:6px;font-weight:500;background:${c};color:#fff;border:none;">Add</button>
          </div>
        </div>
      </div>`;
  }

  document.getElementById('root').innerHTML = `
    <div style="display:flex;min-height:100vh;position:relative;">
      ${sidebar}
      ${main}
      ${modalHtml}
    </div>`;

  attachEvents();
}

// ─── Event binding ─────────────────────────────────────────────────────────
function attachEvents() {
  document.querySelectorAll('.ch-item').forEach(el =>
    el.addEventListener('click', () => { selId = el.dataset.cid; save(); render(); }));

  document.getElementById('btn-add-ch')?.addEventListener('click', () => { modal = { type: 'channel' }; render(); });

  document.getElementById('btn-notif')?.addEventListener('click', requestNotifications);

  document.getElementById('del-ch')?.addEventListener('click', () => {
    channels = channels.filter(c => c.id !== selId);
    selId = channels[0]?.id || null;
    save(); render();
  });

  document.getElementById('btn-add-phase')?.addEventListener('click', () => { modal = { type: 'phase' }; render(); });

  document.querySelectorAll('.add-task-btn').forEach(el =>
    el.addEventListener('click', () => { modal = { type: 'task', pid: el.dataset.pid }; render(); }));

  document.querySelectorAll('.del-phase').forEach(el =>
    el.addEventListener('click', () => {
      channels = channels.map(c => c.id === selId
        ? { ...c, phases: c.phases.filter(p => p.id !== el.dataset.pid) } : c);
      save(); render();
    }));

  document.querySelectorAll('.chk').forEach(el =>
    el.addEventListener('click', () => {
      const { tid, pid } = el.dataset;
      channels = channels.map(c => c.id === selId ? { ...c, phases: c.phases.map(p =>
        p.id === pid ? { ...p, tasks: p.tasks.map(t =>
          t.id === tid ? { ...t, done: !t.done } : t) } : p) } : c);
      save(); render();
    }));

  document.querySelectorAll('.del-task').forEach(el =>
    el.addEventListener('click', () => {
      const { tid, pid } = el.dataset;
      channels = channels.map(c => c.id === selId ? { ...c, phases: c.phases.map(p =>
        p.id === pid ? { ...p, tasks: p.tasks.filter(t => t.id !== tid) } : p) } : c);
      save(); render();
    }));

  document.getElementById('m-cancel')?.addEventListener('click', () => { modal = null; render(); });

  document.querySelectorAll('.cpick').forEach(el =>
    el.addEventListener('click', () => {
      document.querySelectorAll('.cpick').forEach(e => { e.style.border = '2.5px solid transparent'; e.style.outline = 'none'; });
      el.style.border = `2.5px solid ${el.dataset.c}`;
      el.style.outline = `2px solid ${el.dataset.c}`;
      el.style.outlineOffset = '2px';
      document.getElementById('f-color').value = el.dataset.c;
    }));

  document.getElementById('m-submit')?.addEventListener('click', () => {
    if (modal.type === 'channel') {
      const name  = document.getElementById('f-name')?.value?.trim() || 'New Channel';
      const subs  = document.getElementById('f-subs')?.value?.trim() || '';
      const color = document.getElementById('f-color')?.value || COLORS[0];
      const ch = { id: uid(), name, subs, color, phases: [] };
      channels = [...channels, ch]; selId = ch.id;
    } else if (modal.type === 'phase') {
      const name = document.getElementById('f-name')?.value?.trim() || 'New Phase';
      channels = channels.map(c => c.id === selId
        ? { ...c, phases: [...c.phases, { id: uid(), name, tasks: [] }] } : c);
    } else {
      const name  = document.getElementById('f-name')?.value?.trim() || 'New Task';
      const date  = document.getElementById('f-date')?.value || '';
      const notes = document.getElementById('f-notes')?.value?.trim() || '';
      channels = channels.map(c => c.id === selId ? { ...c, phases: c.phases.map(p =>
        p.id === modal.pid ? { ...p, tasks: [...p.tasks, { id: uid(), name, date, notes, done: false }] } : p) } : c);
    }
    modal = null; save(); render();
  });

  // Enter key submits modal
  document.querySelectorAll('#root input:not([type="date"]):not([type="hidden"])').forEach(inp =>
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('m-submit')?.click(); }));
}

// ─── Service Worker registration ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW failed:', err));
  });
}

// ─── Boot ──────────────────────────────────────────────────────────────────
load();
render();
checkNotifs();
setInterval(checkNotifs, 60 * 1000);
</script>
</body>
</html>
